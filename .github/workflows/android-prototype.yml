name: Android Prototype

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - 'packages/game-data/**'
      - 'scripts/sync-game-data.mjs'
      - '.github/workflows/android-prototype.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-debug-apk:
    runs-on: ubuntu-24.04
    env:
      GODOT_VERSION: 4.7.1-stable
      GODOT_TEMPLATE_VERSION: 4.7.1.stable
      ANDROID_BUILD_TOOLS: 36.0.0
      ANDROID_NDK: 28.1.13356709
      ANDROID_CMAKE: 3.10.2.4988404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android toolchain
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK}" "cmake;${ANDROID_CMAKE}"

      - name: Install Node dependencies and check shared data
        run: |
          npm ci
          npm run android:data:check

      - name: Download pinned Godot editor and templates
        run: |
          curl --fail --location --silent --show-error "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" --output /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x "/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          echo "Godot editor SHA-256: $(sha256sum "/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64")"
          curl --fail --location --silent --show-error "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz" --output /tmp/templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp -R /tmp/templates/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"

      - name: Validate Godot gameplay contracts
        run: |
          GODOT="/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          timeout 180s "$GODOT" --headless --path apps/android --editor --quit
          timeout 120s "$GODOT" --headless --path apps/android --script res://tests/item_inventory_test.gd
          timeout 120s "$GODOT" --headless --path apps/android --script res://tests/weapon_interaction_test.gd
          timeout 120s "$GODOT" --headless --path apps/android --script res://tests/infected_brain_test.gd
          timeout 120s "$GODOT" --headless --path apps/android --script res://tests/combat_polish_test.gd

      - name: Import and export debug APK
        env:
          ANDROID_DEV_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEV_KEYSTORE_BASE64 }}
          ANDROID_DEV_KEY_ALIAS: ${{ secrets.ANDROID_DEV_KEY_ALIAS }}
          ANDROID_DEV_STORE_PASSWORD: ${{ secrets.ANDROID_DEV_STORE_PASSWORD }}
          ANDROID_DEV_KEY_PASSWORD: ${{ secrets.ANDROID_DEV_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p apps/android/artifacts
          GODOT="/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          SIGNING_KEYSTORE="$RUNNER_TEMP/the-infected-dev-signing.jks"
          SIGNED_APK="$RUNNER_TEMP/the-infected-debug-signed.apk"
          trap 'rm -f "$SIGNING_KEYSTORE" "$SIGNED_APK"' EXIT
          printf '%s' "$ANDROID_DEV_KEYSTORE_BASE64" | base64 --decode > "$SIGNING_KEYSTORE"
          chmod 600 "$SIGNING_KEYSTORE"
          "$GODOT" --headless --path apps/android --editor --quit
          "$GODOT" --headless --path apps/android --install-android-build-template --export-debug "Android Debug" artifacts/the-infected-debug.apk
          "$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" sign \
            --ks "$SIGNING_KEYSTORE" \
            --ks-type JKS \
            --ks-key-alias "$ANDROID_DEV_KEY_ALIAS" \
            --ks-pass env:ANDROID_DEV_STORE_PASSWORD \
            --key-pass env:ANDROID_DEV_KEY_PASSWORD \
            --out "$SIGNED_APK" \
            apps/android/artifacts/the-infected-debug.apk
          mv "$SIGNED_APK" apps/android/artifacts/the-infected-debug.apk
          AAPT_BADGING=/tmp/the-infected-apk-badging.txt
          "$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}/aapt" dump badging apps/android/artifacts/the-infected-debug.apk > "$AAPT_BADGING"
          grep -F "package: name='app.theinfected.game'" "$AAPT_BADGING"
          grep -F "sdkVersion:'28'" "$AAPT_BADGING"
          grep -F "targetSdkVersion:'36'" "$AAPT_BADGING"
          AAPT2_BADGING=/tmp/the-infected-apk-badging-aapt2.txt
          "$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}/aapt2" dump badging apps/android/artifacts/the-infected-debug.apk > "$AAPT2_BADGING"
          grep -F "package: name='app.theinfected.game'" "$AAPT2_BADGING"
          grep -F "minSdkVersion:'28'" "$AAPT2_BADGING"
          grep -F "targetSdkVersion:'36'" "$AAPT2_BADGING"
          "$ANDROID_HOME/build-tools/${ANDROID_BUILD_TOOLS}/apksigner" verify --verbose --print-certs apps/android/artifacts/the-infected-debug.apk
          stat --format='APK size: %s bytes' apps/android/artifacts/the-infected-debug.apk
          sha256sum apps/android/artifacts/the-infected-debug.apk | tee apps/android/artifacts/the-infected-debug.apk.sha256

      - name: Upload debug artifact and hash
        uses: actions/upload-artifact@v4
        with:
          name: the-infected-android-debug
          path: apps/android/artifacts/
