name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run test:game-data
      - run: npm run test:image-generation
      - run: npm run image:generate:self-check
      - run: npm run validate:registry
      - run: npm run secrets:scan
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
